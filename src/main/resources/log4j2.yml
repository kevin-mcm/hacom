Configuration:
  status: warn
  name: telco-order-service

  Appenders:
    Console:
      name: Console
      target: SYSTEM_OUT
      PatternLayout:
        pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n"
    RollingFile:
      name: RollingFile
      fileName: logs/telco-order-service.log
      filePattern: "logs/telco-order-service-%d{yyyy-MM-dd}-%i.log.gz"
      PatternLayout:
        pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n"
      Policies:
        SizeBasedTriggeringPolicy:
          size: 10MB
      DefaultRolloverStrategy:
        max: 10

  Loggers:
    Logger:
      - name: com.hacom.telco
        level: debug
        additivity: false
        AppenderRef:
          - ref: Console
          - ref: RollingFile
    Root:
      level: info
      AppenderRef:
        - ref: Console
        - ref: RollingFile
