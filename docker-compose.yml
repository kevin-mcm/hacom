services:
  mongodb:
    image: mongo:7.0
    container_name: telco-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: exampleDb
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mongodb_data:
